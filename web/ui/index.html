<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>Work Tracker</title>
    <!-- The portfolio's mark, byte for byte from ../portfolio/index.html, because
         these are one author's two sites and the tab is where you notice that
         first. Inline, so it costs no request and cannot 404; Archivo is the
         portfolio's face and resolves to whatever sans the browser has here,
         which at 16px on a pink `d` is a difference nobody has ever seen. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23101014'/%3E%3Ctext x='50' y='68' font-size='56' font-family='Archivo,sans-serif' font-weight='700' fill='%23EC4899' text-anchor='middle'%3Ed%3C/text%3E%3C/svg%3E"
    />
    <!-- Zodiak carries every word on the page, so fetch it with the stylesheet
         rather than after it: without this the whole UI paints in fallback
         Georgia first and reflows once Zodiak lands. -->
    <link
      rel="preload"
      href="/fonts/Zodiak-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
