<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- `viewport-fit=cover` lets the page own the whole screen, notch and home
         indicator included -- which is what an iPhone hands a web app added to the
         Home Screen, whether it asked for it or not (iOS 17 opens those standalone
         by default). It is also what makes env(safe-area-inset-*) report anything
         but zero, and styles.css spends those insets keeping text out from under
         the status bar. Without this the wash stops short of the edges and the
         insets read 0, so the padding that needs them silently does nothing. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <!-- The paper, so the standalone app's status bar sits on the page's own
         ground instead of a colour iOS picked. Matches ../portfolio. -->
    <meta name="theme-color" content="#101014" />
    <title>Work Tracker</title>

    <!-- The author's mark, shared with ../portfolio, in three cuts because one is
         not enough. The portfolio carries it as a lone inline SVG, and an SVG
         favicon is a thing Safari has never supported at any version -- so there
         it quietly renders as nothing, and here it did too.

         favicon.ico comes first and is the one that does the work. It holds the
         16, 32 and 48 rasters in one file at the path every browser has probed
         since 1999 -- and, crucially, probes *without reading this document*.
         That is the case the link tags below cannot serve: an icon fetched out of
         band, by a sidebar or a tab strip that never parsed the head, finds
         nothing unless something is sitting at /favicon.ico. Something is now.

         icon.svg is kept for the browsers that support it, being the one cut that
         stays crisp at any size. Between the two, every browser has a cut it can
         paint, and neither is asked to guess.

         apple-touch-icon is separate and not optional: iOS reads *only* this for
         a Home Screen tile -- never rel=icon -- and will not take a data: URI for
         it. Its absence is why the tile came out blank. It is full-bleed and
         square on purpose: iOS masks its own squircle, and pre-rounded corners
         would be rounded twice.

         public/icon.svg is the source all of these are cut from; its comment says
         how. -->
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Work Tracker" />
    <!-- Zodiak carries every word on the page, so fetch it with the stylesheet
         rather than after it: without this the whole UI paints in fallback
         Georgia first and reflows once Zodiak lands. -->
    <link
      rel="preload"
      href="/fonts/Zodiak-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
