<!-- The author's mark, shared with ../portfolio: a pink `d` on the paper ground.

     This is the vector original, kept as a file rather than inlined as a data:
     URI so the rasters beside it (favicon-32.png, apple-touch-icon.png) have one
     source to be cut from, and so Safari -- which has never supported an SVG
     favicon -- has something else to fall back to. See index.html.

     `Archivo` is named because ../portfolio names it, and it resolves to whatever
     grotesque the viewer has: the font is not loaded anywhere (a favicon cannot
     pull a webfont), and the portfolio has never loaded it either. The PNGs next
     to this were cut with the same stack, so the mark is one letter in one shape
     wherever it lands. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="20" fill="#101014"/>
  <text x="50" y="68" font-size="56" font-family="Archivo,sans-serif" font-weight="700"
        fill="#EC4899" text-anchor="middle">d</text>
</svg>
